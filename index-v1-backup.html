<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERVIDOR — Centro de Operaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D1C; --panel:#12172E; --panel-2:#1A2040; --line:#242B52;
  --ink:#EAEDFB; --muted:#8B93BE; --dim:#5A6190;
  --violet:#8C7BFF; --violet-soft:rgba(140,123,255,.14);
  --gold:#E9B44C; --gold-soft:rgba(233,180,76,.13);
  --blue:#7FB4F0; --danger:#E86A6A;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Manrope',system-ui,sans-serif; font-size:15px; line-height:1.5;
  min-height:100vh;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% -10%, rgba(140,123,255,.13), transparent 60%),
    radial-gradient(ellipse 50% 35% at 10% 110%, rgba(233,180,76,.06), transparent 60%);
}
#app{position:relative; z-index:1; max-width:1240px; margin:0 auto; padding:0 20px 80px}
button{font-family:inherit; cursor:pointer}
input,select,textarea{
  font-family:inherit; font-size:14px; color:var(--ink);
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:10px 12px; width:100%;
}
input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible,a:focus-visible{
  outline:2px solid var(--violet); outline-offset:2px;
}
label{display:block; font-size:12px; color:var(--muted); margin:14px 0 5px; font-weight:600; letter-spacing:.04em}
a{color:var(--blue)}

/* ---------- wordmark / header ---------- */
header{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:22px 0 8px; flex-wrap:wrap}
.wordmark{font-family:'Unbounded'; font-weight:600; font-size:17px; letter-spacing:.12em}
.wordmark span{color:var(--violet)}
.wordmark small{display:block; font-family:'Space Mono',monospace; font-size:10px; font-weight:400; color:var(--dim); letter-spacing:.28em; margin-top:2px}
.userchip{display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--violet-soft);border:1px solid var(--violet);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--violet);font-size:13px}
.linkbtn{background:none;border:none;color:var(--dim);font-size:12px;text-decoration:underline}
.linkbtn:hover{color:var(--muted)}

/* ---------- tabs ---------- */
nav{display:flex; gap:6px; margin:18px 0 22px; border-bottom:1px solid var(--line); flex-wrap:wrap}
nav button{
  background:none; border:none; color:var(--muted); padding:10px 16px; font-size:14px; font-weight:700;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
nav button.on{color:var(--ink); border-bottom-color:var(--gold)}
nav button .badge{
  display:inline-block; margin-left:6px; min-width:20px; padding:1px 6px; border-radius:99px;
  background:var(--violet-soft); color:var(--violet); font-size:11px; font-family:'Space Mono',monospace;
}

/* ---------- botones ---------- */
.btn{
  border:none; border-radius:10px; padding:10px 16px; font-weight:800; font-size:13px;
  background:var(--violet); color:#0A0D1C;
}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:var(--panel-2); color:var(--ink); border:1px solid var(--line)}
.btn.gold{background:var(--gold)}
.btn.danger{background:transparent; color:var(--danger); border:1px solid rgba(232,106,106,.4)}
.btn.sm{padding:7px 12px; font-size:12px}
.btn:disabled{opacity:.5; cursor:default}

/* ---------- login ---------- */
.login-wrap{max-width:400px; margin:9vh auto 0}
.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:26px}
.login-wrap .wordmark{font-size:22px; text-align:center; margin-bottom:26px}
.login-wrap .wordmark small{letter-spacing:.32em}
.err{color:var(--danger); font-size:13px; margin-top:12px; min-height:18px}

/* ---------- barra de filtros ---------- */
.filters{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center}
.filters select{width:auto; min-width:150px}
.spacer{flex:1}

/* ---------- tablero ---------- */
.board{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
@media(max-width:960px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.board{grid-template-columns:1fr}}
.col h3{
  font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.2em;
  color:var(--muted); text-transform:uppercase; padding:4px 2px 10px;
  display:flex; align-items:center; gap:8px;
}
.col h3 .dot{width:8px;height:8px;border-radius:50%}
.col h3 .n{margin-left:auto; color:var(--dim)}

/* ---------- tarjeta ---------- */
.task{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
  padding:14px; margin-bottom:12px; cursor:pointer; transition:border-color .15s, transform .15s;
}
.task:hover{border-color:var(--violet); transform:translateY(-1px)}
.task.done{border-color:rgba(233,180,76,.35); box-shadow:0 0 18px rgba(233,180,76,.07)}
.task .title{font-weight:800; font-size:14px; margin-bottom:6px}
.task .meta{display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:11px; color:var(--muted)}
.chip{background:var(--panel-2); border:1px solid var(--line); border-radius:99px; padding:2px 9px; font-size:11px}
.chip.canal{color:var(--blue)}
.chip.alta{color:var(--danger); border-color:rgba(232,106,106,.4)}
.chip.media{color:var(--gold)}
.chip.baja{color:var(--muted)}
.due{font-family:'Space Mono',monospace; font-size:11px}
.due.overdue{color:var(--danger); font-weight:700}
.files-n{color:var(--dim); font-size:11px}

/* órbita de estado: la firma visual */
.orbit{display:flex; align-items:center; gap:0; margin-top:12px}
.orbit i{width:9px;height:9px;border-radius:50%;background:var(--panel-2);border:1.5px solid var(--line);flex:none}
.orbit b{height:1.5px;background:var(--line);flex:1;max-width:34px}
.orbit i.past{background:var(--violet);border-color:var(--violet)}
.orbit b.past{background:var(--violet)}
.orbit i.now{background:var(--violet);border-color:var(--violet);box-shadow:0 0 0 4px var(--violet-soft)}
.orbit i.gold{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(233,180,76,.55)}
.orbit b.gold{background:var(--gold)}

/* ---------- vista HOY ---------- */
.today-group h2{
  font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--muted); margin:26px 0 12px; display:flex; align-items:center; gap:10px;
}
.today-group h2::after{content:""; flex:1; height:1px; background:var(--line)}
.today-group h2.red{color:var(--danger)}
.today-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px}
.empty{
  border:1px dashed var(--line); border-radius:var(--r); padding:36px; text-align:center;
  color:var(--dim); font-size:14px;
}

/* ---------- equipo ---------- */
.team-row{
  display:flex; align-items:center; gap:12px; background:var(--panel);
  border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; flex-wrap:wrap;
}
.team-row .who{flex:1; min-width:150px}
.team-row .who b{display:block}
.team-row .who span{font-size:12px; color:var(--dim); font-family:'Space Mono',monospace}
.rolechip{font-size:11px; padding:3px 10px; border-radius:99px; font-weight:800}
.rolechip.admin{background:var(--gold-soft); color:var(--gold)}
.rolechip.editor{background:var(--violet-soft); color:var(--violet)}
.inactive{opacity:.45}

/* ---------- modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(5,7,17,.75); backdrop-filter:blur(3px);
  display:flex; align-items:flex-start; justify-content:center; padding:5vh 16px; z-index:50; overflow:auto;
}
.modal{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; width:100%; max-width:560px}
.modal h2{font-size:17px; margin-bottom:4px}
.modal .sub{font-size:12px; color:var(--dim); font-family:'Space Mono',monospace}
.modal-actions{display:flex; gap:10px; margin-top:22px; flex-wrap:wrap}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}

/* detalle de tarea */
.detail-desc{white-space:pre-wrap; color:var(--muted); font-size:14px; margin:10px 0}
.filelist{margin:8px 0}
.filerow{
  display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--panel-2);
  border:1px solid var(--line); border-radius:10px; margin-bottom:7px;
}
.filerow .kind{font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:.1em; text-transform:uppercase; flex:none}
.filerow a{flex:1; font-weight:700; font-size:13px; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.filerow a:hover{text-decoration:underline}
.filerow button{background:none;border:none;color:var(--dim);font-size:15px}
.filerow button:hover{color:var(--danger)}
.status-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px}
.addfile{display:grid; grid-template-columns:1fr 1.4fr auto auto; gap:8px; margin-top:10px}
@media(max-width:560px){.addfile{grid-template-columns:1fr}}
.addfile input,.addfile select{padding:8px 10px; font-size:13px}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--panel-2); border:1px solid var(--violet); color:var(--ink);
  padding:11px 20px; border-radius:12px; font-size:13px; font-weight:700; z-index:99;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
@media (prefers-reduced-motion:no-preference){
  .task,.modal{animation:up .18s ease}
  @keyframes up{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =============================== estado global =============================== */
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('srv_token') || null;
let ME = null, USERS = [], TASKS = [], CHANNELS = [], STATS = {};
let TAB = 'hoy';
let FILTER = { assigned: '', channel: '' };

const STATUS_META = {
  pendiente:   { label:'Pendiente',   color:'#8B93BE' },
  en_progreso: { label:'En progreso', color:'#8C7BFF' },
  entregada:   { label:'Entregada',   color:'#7FB4F0' },
  aprobada:    { label:'Aprobada',    color:'#E9B44C' },
};
const ORDER = ['pendiente','en_progreso','entregada','aprobada'];

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers||{}) };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch('/api' + path, { ...opts, headers });
  if (res.status === 401 && TOKEN) { logout(false); throw new Error('Sesión expirada.'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || 'Error del servidor.');
  return data;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2600);
}
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(s){
  if(!s) return '';
  const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y.slice(2);
}

/* =============================== arranque =============================== */
async function boot(){
  if (!TOKEN){
    const b = await api('/bootstrap');
    renderLogin(b.needs_setup);
    return;
  }
  try{
    ME = await api('/me');
    await refresh();
    renderApp();
  }catch(e){ renderLogin(false); }
}

async function refresh(){
  [USERS, TASKS, CHANNELS, STATS] = await Promise.all([
    api('/users'), api('/tasks'), api('/channels'), api('/stats')
  ]);
}

function logout(call=true){
  if(call) api('/logout', {method:'POST'}).catch(()=>{});
  TOKEN=null; ME=null; localStorage.removeItem('srv_token');
  renderLogin(false);
}

/* =============================== login / setup =============================== */
function renderLogin(needsSetup){
  $('#app').innerHTML = `
  <div class="login-wrap">
    <div class="wordmark">SERVI<span>DOR</span><small>CENTRO DE OPERACIONES</small></div>
    <div class="card">
      ${needsSetup ? `
        <p style="font-size:13px;color:var(--muted);margin-bottom:4px">Primera vez: crea la cuenta del administrador.</p>
        <label>Nombre para mostrar</label><input id="f-name" placeholder="Stevn">
      ` : ''}
      <label>Usuario</label><input id="f-user" autocomplete="username">
      <label>Contraseña</label><input id="f-pass" type="password" autocomplete="current-password">
      <div class="err" id="f-err"></div>
      <button class="btn" style="width:100%" id="f-go">${needsSetup?'Crear cuenta admin':'Entrar'}</button>
    </div>
  </div>`;
  const go = async () => {
    const u=$('#f-user').value.trim(), p=$('#f-pass').value;
    try{
      if(needsSetup){
        await api('/setup',{method:'POST',body:JSON.stringify({username:u,password:p,display_name:$('#f-name').value.trim()||u})});
      }
      const r = await api('/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
      TOKEN=r.token; localStorage.setItem('srv_token',TOKEN);
      ME=r.user; await refresh(); renderApp();
    }catch(e){ $('#f-err').textContent = e.message; }
  };
  $('#f-go').onclick = go;
  $('#f-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
}

/* =============================== app shell =============================== */
function renderApp(){
  const isAdmin = ME.role==='admin';
  $('#app').innerHTML = `
  <header>
    <div class="wordmark">SERVI<span>DOR</span><small>CENTRO DE OPERACIONES</small></div>
    <div class="userchip">
      <div class="avatar">${esc(ME.display_name[0]?.toUpperCase()||'?')}</div>
      <div><b>${esc(ME.display_name)}</b> · ${ME.role==='admin'?'Administrador':'Editor'}<br>
      <button class="linkbtn" onclick="logout()">Cerrar sesión</button></div>
    </div>
  </header>
  <nav>
    <button id="tab-hoy" onclick="setTab('hoy')">Hoy <span class="badge">${STATS.mias_pendientes||0}</span></button>
    <button id="tab-tablero" onclick="setTab('tablero')">Tablero</button>
    ${isAdmin?`<button id="tab-equipo" onclick="setTab('equipo')">Equipo</button>`:''}
  </nav>
  <div id="view"></div>`;
  setTab(TAB);
}

function setTab(t){
  TAB=t;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  const btn = $('#tab-'+t); if(btn) btn.classList.add('on'); else { TAB='hoy'; $('#tab-hoy').classList.add('on'); }
  if(TAB==='hoy') renderHoy();
  else if(TAB==='tablero') renderTablero();
  else renderEquipo();
}

/* =============================== tarjeta de tarea =============================== */
function orbitHTML(status){
  const idx = ORDER.indexOf(status);
  let h = '<div class="orbit" title="'+STATUS_META[status].label+'">';
  ORDER.forEach((s,i)=>{
    const gold = status==='aprobada';
    let cls = '';
    if (gold) cls = 'gold';
    else if (i < idx) cls = 'past';
    else if (i === idx) cls = 'now';
    h += `<i class="${cls}"></i>`;
    if(i<3) h += `<b class="${gold?'gold': (i<idx?'past':'')}"></b>`;
  });
  return h+'</div>';
}

function taskCard(t){
  const overdue = t.due_date && t.due_date < todayStr() && t.status!=='aprobada';
  return `
  <div class="task ${t.status==='aprobada'?'done':''}" onclick="openTask(${t.id})" role="button" tabindex="0"
       onkeydown="if(event.key==='Enter')openTask(${t.id})">
    <div class="title">${esc(t.title)}</div>
    <div class="meta">
      ${t.channel?`<span class="chip canal">${esc(t.channel)}</span>`:''}
      <span class="chip ${t.priority}">${t.priority}</span>
      ${t.assigned_name?`<span>→ ${esc(t.assigned_name)}</span>`:'<span style="color:var(--dim)">sin asignar</span>'}
      ${t.due_date?`<span class="due ${overdue?'overdue':''}">${overdue?'⚠ ':''}${fmtDate(t.due_date)}</span>`:''}
      ${t.file_count?`<span class="files-n">📎 ${t.file_count}</span>`:''}
    </div>
    ${orbitHTML(t.status)}
  </div>`;
}

/* =============================== vista HOY =============================== */
function renderHoy(){
  const hoy = todayStr();
  const mine = ME.role==='admin' ? TASKS : TASKS.filter(t=>t.assigned_to===ME.id);
  const activas = mine.filter(t=>t.status!=='aprobada');
  const vencidas = activas.filter(t=>t.due_date && t.due_date < hoy);
  const deHoy    = activas.filter(t=>t.due_date === hoy);
  const proximas = activas.filter(t=>!t.due_date || t.due_date > hoy);
  const porRevisar = ME.role==='admin' ? TASKS.filter(t=>t.status==='entregada') : [];

  const group=(title,items,red)=> items.length ? `
    <div class="today-group"><h2 class="${red?'red':''}">${title} · ${items.length}</h2>
    <div class="today-grid">${items.map(taskCard).join('')}</div></div>` : '';

  $('#view').innerHTML = `
    ${ME.role==='admin'?`<div class="filters"><span class="spacer"></span>
      <button class="btn" onclick="openNewTask()">+ Nueva tarea</button></div>`:''}
    ${group('⚠ Vencidas', vencidas, true)}
    ${group('Para hoy', deHoy)}
    ${porRevisar.length?group('Entregadas · por revisar', porRevisar):''}
    ${group('Próximas / sin fecha', proximas)}
    ${!activas.length && !porRevisar.length ? `<div class="empty">Nada pendiente por hoy. ✦<br>Crea una tarea o revisa el Tablero.</div>`:''}
  `;
}

/* =============================== vista TABLERO =============================== */
function renderTablero(){
  let list = TASKS;
  if(FILTER.assigned) list = list.filter(t=>String(t.assigned_to)===FILTER.assigned);
  if(FILTER.channel)  list = list.filter(t=>t.channel===FILTER.channel);

  $('#view').innerHTML = `
  <div class="filters">
    <select id="fl-user" onchange="FILTER.assigned=this.value;renderTablero()">
      <option value="">Todos los usuarios</option>
      ${USERS.filter(u=>u.active).map(u=>`<option value="${u.id}" ${String(u.id)===FILTER.assigned?'selected':''}>${esc(u.display_name)}</option>`).join('')}
    </select>
    <select id="fl-ch" onchange="FILTER.channel=this.value;renderTablero()">
      <option value="">Todos los canales</option>
      ${CHANNELS.map(c=>`<option ${c===FILTER.channel?'selected':''}>${esc(c)}</option>`).join('')}
    </select>
    <span class="spacer"></span>
    ${ME.role==='admin'?`<button class="btn" onclick="openNewTask()">+ Nueva tarea</button>`:''}
  </div>
  <div class="board">
    ${ORDER.map(s=>{
      const items = list.filter(t=>t.status===s);
      return `<div class="col">
        <h3><span class="dot" style="background:${STATUS_META[s].color}"></span>${STATUS_META[s].label}<span class="n">${items.length}</span></h3>
        ${items.map(taskCard).join('') || '<div class="empty" style="padding:20px">—</div>'}
      </div>`;
    }).join('')}
  </div>`;
}

/* =============================== modal: nueva tarea =============================== */
function openNewTask(){
  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML = `<div class="modal">
    <h2>Nueva tarea</h2><div class="sub">SE CREA COMO PENDIENTE</div>
    <label>Título *</label><input id="t-title" placeholder="Editar video: 7 hierbas antiinflamatorias">
    <label>Descripción / instrucciones</label><textarea id="t-desc" rows="3"></textarea>
    <div class="row2">
      <div><label>Canal</label><input id="t-channel" list="chlist" placeholder="Ingeniería de la Manifestación">
        <datalist id="chlist">${CHANNELS.map(c=>`<option>${esc(c)}</option>`).join('')}</datalist></div>
      <div><label>Asignar a</label><select id="t-assign"><option value="">— Sin asignar —</option>
        ${USERS.filter(u=>u.active).map(u=>`<option value="${u.id}">${esc(u.display_name)}</option>`).join('')}</select></div>
    </div>
    <div class="row2">
      <div><label>Fecha límite</label><input id="t-due" type="date"></div>
      <div><label>Prioridad</label><select id="t-prio"><option>alta</option><option selected>media</option><option>baja</option></select></div>
    </div>
    <div class="err" id="t-err"></div>
    <div class="modal-actions">
      <button class="btn" id="t-save">Crear tarea</button>
      <button class="btn ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  $('#t-save').onclick = async ()=>{
    const title=$('#t-title').value.trim();
    if(!title){ $('#t-err').textContent='El título es obligatorio.'; return; }
    try{
      await api('/tasks',{method:'POST',body:JSON.stringify({
        title, description:$('#t-desc').value, channel:$('#t-channel').value.trim(),
        assigned_to: $('#t-assign').value?Number($('#t-assign').value):null,
        due_date:$('#t-due').value, priority:$('#t-prio').value,
      })});
      ov.remove(); await refresh(); renderApp(); toast('Tarea creada ✦');
    }catch(e){ $('#t-err').textContent=e.message; }
  };
}

/* =============================== modal: detalle de tarea =============================== */
async function openTask(id){
  let t;
  try{ t = await api('/tasks/'+id); }catch(e){ toast(e.message); return; }
  const isAdmin = ME.role==='admin';
  const isMine = t.assigned_to===ME.id;

  const nextBtns = [];
  if(isAdmin || isMine){
    if(t.status==='pendiente')   nextBtns.push(['en_progreso','Empezar','ghost'],['entregada','Marcar entregada','']);
    if(t.status==='en_progreso') nextBtns.push(['entregada','Marcar entregada',''],['pendiente','Volver a pendiente','ghost']);
    if(t.status==='entregada'){
      if(isAdmin) nextBtns.push(['aprobada','✦ Aprobar','gold']);
      nextBtns.push(['en_progreso','Devolver a progreso','ghost']);
    }
    if(t.status==='aprobada' && isAdmin) nextBtns.push(['entregada','Reabrir','ghost']);
  }

  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML = `<div class="modal">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:start">
      <div><h2>${esc(t.title)}</h2>
      <div class="sub">#${t.id} · ${STATUS_META[t.status].label.toUpperCase()} · CREÓ ${esc(t.creator_name||'—')}</div></div>
      ${isAdmin?`<button class="btn danger sm" id="d-del">Eliminar</button>`:''}
    </div>
    ${orbitHTML(t.status)}
    <div class="detail-desc">${esc(t.description)||'<i style="color:var(--dim)">Sin descripción.</i>'}</div>
    <div class="meta" style="display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)">
      ${t.channel?`<span class="chip canal">${esc(t.channel)}</span>`:''}
      <span class="chip ${t.priority}">${t.priority}</span>
      ${t.assigned_name?`<span class="chip">→ ${esc(t.assigned_name)}</span>`:''}
      ${t.due_date?`<span class="chip due">${fmtDate(t.due_date)}</span>`:''}
    </div>

    <label>Archivos vinculados (guion, miniatura, música, video…)</label>
    <div class="filelist">
      ${t.files.map(f=>`<div class="filerow">
        <span class="kind">${esc(f.kind)}</span>
        <a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.label)}</a>
        ${(isAdmin||f.added_by===ME.id)?`<button title="Quitar" onclick="delFile(${f.id},${t.id})">✕</button>`:''}
      </div>`).join('') || '<div style="font-size:13px;color:var(--dim)">Aún no hay archivos vinculados.</div>'}
    </div>
    ${(isAdmin||isMine)?`
    <div class="addfile">
      <select id="d-kind"><option>guion</option><option>miniatura</option><option>música</option><option>video</option><option>bucle</option><option>archivo</option></select>
      <input id="d-label" placeholder="Nombre (ej. Guion v2)">
      <input id="d-url" placeholder="https://drive.google.com/…" style="grid-column:1/-2">
      <button class="btn sm ghost" id="d-addfile" style="grid-column:-2/-1">Agregar</button>
    </div>`:''}

    ${(isAdmin||isMine)?`<label>Nota de entrega</label>
    <textarea id="d-note" rows="2" placeholder="Ej: quedó en Servidor 1 / carpeta IM / video 43">${esc(t.delivery_note)}</textarea>`:
    (t.delivery_note?`<label>Nota de entrega</label><div class="detail-desc">${esc(t.delivery_note)}</div>`:'')}

    <div class="status-actions">
      ${nextBtns.map(([s,l,cls])=>`<button class="btn sm ${cls}" onclick="moveTask(${t.id},'${s}')">${l}</button>`).join('')}
      <span class="spacer"></span>
      <button class="btn ghost sm" onclick="this.closest('.overlay').remove()">Cerrar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });

  const addBtn = $('#d-addfile');
  if(addBtn) addBtn.onclick = async ()=>{
    const label=$('#d-label').value.trim(), url=$('#d-url').value.trim();
    if(!label||!url){ toast('Falta el nombre o el link.'); return; }
    try{
      await api(`/tasks/${t.id}/files`,{method:'POST',body:JSON.stringify({label,url,kind:$('#d-kind').value})});
      ov.remove(); await refresh(); setTab(TAB); openTask(t.id);
    }catch(e){ toast(e.message); }
  };
  const noteEl = $('#d-note');
  if(noteEl) noteEl.addEventListener('change', async ()=>{
    try{ await api('/tasks/'+t.id,{method:'PATCH',body:JSON.stringify({delivery_note:noteEl.value})}); toast('Nota guardada'); }
    catch(e){ toast(e.message); }
  });
  const del = $('#d-del');
  if(del) del.onclick = async ()=>{
    if(!confirm('¿Eliminar esta tarea definitivamente?')) return;
    try{ await api('/tasks/'+t.id,{method:'DELETE'}); ov.remove(); await refresh(); renderApp(); toast('Tarea eliminada'); }
    catch(e){ toast(e.message); }
  };
}

async function moveTask(id, status){
  try{
    await api('/tasks/'+id,{method:'PATCH',body:JSON.stringify({status})});
    document.querySelectorAll('.overlay').forEach(o=>o.remove());
    await refresh(); renderApp();
    toast(status==='aprobada' ? '✦ Tarea aprobada' : 'Estado: '+STATUS_META[status].label);
  }catch(e){ toast(e.message); }
}

async function delFile(fileId, taskId){
  try{
    await api('/files/'+fileId,{method:'DELETE'});
    document.querySelectorAll('.overlay').forEach(o=>o.remove());
    await refresh(); openTask(taskId);
  }catch(e){ toast(e.message); }
}

/* =============================== vista EQUIPO =============================== */
function renderEquipo(){
  $('#view').innerHTML = `
  <div class="filters"><span class="spacer"></span>
    <button class="btn" onclick="openNewUser()">+ Nuevo usuario</button></div>
  ${USERS.map(u=>`
    <div class="team-row ${u.active?'':'inactive'}">
      <div class="avatar">${esc(u.display_name[0]?.toUpperCase()||'?')}</div>
      <div class="who"><b>${esc(u.display_name)}</b><span>@${esc(u.username)}</span></div>
      <span class="rolechip ${u.role}">${u.role}</span>
      ${u.id!==ME.id?`
        <button class="btn ghost sm" onclick="toggleUser(${u.id},${u.active?'false':'true'})">${u.active?'Desactivar':'Activar'}</button>
        <button class="btn ghost sm" onclick="resetPass(${u.id},'${esc(u.display_name)}')">Nueva clave</button>
      `:'<span style="font-size:12px;color:var(--dim)">(tú)</span>'}
    </div>`).join('')}
  `;
}

function openNewUser(){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <h2>Nuevo usuario</h2><div class="sub">CADA PERSONA ENTRA CON SU PROPIA CUENTA</div>
    <label>Nombre para mostrar *</label><input id="u-name" placeholder="Carlos (edición)">
    <div class="row2">
      <div><label>Usuario *</label><input id="u-user" placeholder="carlos"></div>
      <div><label>Rol</label><select id="u-role"><option value="editor" selected>editor</option><option value="admin">admin</option></select></div>
    </div>
    <label>Contraseña * (mínimo 6)</label><input id="u-pass" type="text" value="">
    <div class="err" id="u-err"></div>
    <div class="modal-actions">
      <button class="btn" id="u-save">Crear usuario</button>
      <button class="btn ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
  $('#u-save').onclick=async()=>{
    try{
      await api('/users',{method:'POST',body:JSON.stringify({
        username:$('#u-user').value.trim(), password:$('#u-pass').value,
        display_name:$('#u-name').value.trim(), role:$('#u-role').value })});
      ov.remove(); await refresh(); renderEquipo(); toast('Usuario creado');
    }catch(e){ $('#u-err').textContent=e.message; }
  };
}

async function toggleUser(id, active){
  try{ await api('/users/'+id,{method:'PATCH',body:JSON.stringify({active})}); await refresh(); renderEquipo(); }
  catch(e){ toast(e.message); }
}
async function resetPass(id, name){
  const p = prompt('Nueva contraseña para '+name+' (mínimo 6 caracteres):');
  if(!p) return;
  try{ await api('/users/'+id,{method:'PATCH',body:JSON.stringify({password:p})}); toast('Contraseña actualizada'); }
  catch(e){ toast(e.message); }
}

boot();
</script>
