    <div class="sr-row" role="button" tabindex="0"
        onclick="jumpToTask(${t.id},'${esc(t.channel||'').replace(/'/g,"\\'")}')"
        onkeydown="if(event.key==='Enter')jumpToTask(${t.id},'${esc(t.channel||'').replace(/'/g,"\\'")}')">
      <span class="sr-kind" style="color:${STATUS_META[t.status].hex}">${STATUS_META[t.status].label}</span>
      <div class="sr-main">
        <div class="sr-title">${highlight(t.title, q)}</div>
        <div class="sr-meta">
          ${t.channel?`<span class="ch">${highlight(t.channel,q)}</span>`:'<span style="color:var(--dim)">sin canal</span>'}
          ${t.file_count?`<span>📎 ${t.file_count}</span>`:'<span style="color:var(--dim)">sin archivos</span>'}
          ${t.folder_link?'':'<span style="color:var(--dim)">aún no archivado en Drive</span>'}
        </div>
      </div>
      ${folderBtn(t.folder_link)}
      <span class="sr-open">Abrir →</span>
    </div>`;

  const nF = data.files.length, nT = data.tasks.length;
  if(!nF && !nT){
    $('#results').innerHTML = `<div class="empty" style="margin-top:6px">
      Nada coincide con “<b>${esc(q)}</b>”${ch?` en <b>${esc(ch)}</b>`:''}.<br>
      <span style="font-size:12.5px;color:var(--dim)">Si es un video nuevo, es buena señal: parece que aún no lo subimos.</span>
    </div>`;
    return;
  }
  $('#results').innerHTML = `
    ${nF?`<div class="sr-group"><h3>Archivos<span>${nF}</span></h3>${data.files.map(fileRow).join('')}</div>`:''}
    ${nT?`<div class="sr-group"><h3>Tareas / videos<span>${nT}</span></h3>${data.tasks.map(taskRow).join('')}</div>`:''}
  `;
}

function fmtWhen(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
}

/* ---- subida directa navegador → Drive (reanudable por chunks) ---- */
async function uploadFileToDrive(taskId, file, subpath, folderName, onBytes){
  const init = await api(`/tasks/${taskId}/drive/init`,{method:'POST',body:JSON.stringify({
    filename:file.name, size:file.size, mime:file.type||'application/octet-stream',
    subpath: subpath||'', folder_name: folderName||''
  })});
  const CHUNK = 8*1024*1024;               // 8 MB (múltiplo de 256 KB)
  let start = 0, driveFileId = null;
  if(file.size === 0) throw new Error(`"${file.name}" está vacío (0 bytes).`);
  while(start < file.size){
    const end = Math.min(start+CHUNK, file.size);
    const res = await fetch(init.session_uri,{
      method:'PUT',
      headers:{ 'Content-Range':`bytes ${start}-${end-1}/${file.size}` },
      body:file.slice(start,end)
    });
    if(res.status===308){
      const range = res.headers.get('Range');
      start = range ? (parseInt(range.split('-')[1])+1) : end;
      onBytes(start);
    } else if(res.status===200 || res.status===201){
      const body = await res.json();
      driveFileId = body.id; onBytes(file.size); break;
    } else {
      throw new Error('Drive rechazó la subida de "'+file.name+'" (código '+res.status+').');
    }
  }
  if(!driveFileId) throw new Error('La subida de "'+file.name+'" no terminó.');
  return api(`/tasks/${taskId}/drive/complete`,{method:'POST',body:JSON.stringify({drive_file_id:driveFileId})});
}

/* =============================== modal: terminar y archivar =============================== */
const JUNK_FILES = new Set(['.ds_store','thumbs.db','desktop.ini','.localized']);

function normalizeFolderFiles(raw){
  // raw: [{file, rel}] — quita basura del sistema y el nombre de la carpeta raíz
  let items = raw.filter(x=>{
    const base = x.rel.split('/').pop().toLowerCase();
    return !JUNK_FILES.has(base) && !base.startsWith('._');
  });
  const firsts = new Set(items.map(x=>x.rel.split('/')[0]));
  if(firsts.size===1 && items.some(x=>x.rel.includes('/'))){
    items = items.map(x=>({file:x.file, rel:x.rel.split('/').slice(1).join('/')}));
  }
  return items;
}

async function filesFromDrop(dataTransfer){
  const out = [];
  const walk = (entry, path)=>new Promise(resolve=>{
    if(entry.isFile){
      entry.file(f=>{ out.push({file:f, rel:path+f.name}); resolve(); }, ()=>resolve());
    } else if(entry.isDirectory){
      const reader = entry.createReader();
      const readAll = ()=>{
        reader.readEntries(async entries=>{
          if(!entries.length) return resolve();
          for(const e of entries) await walk(e, path+entry.name+'/');
          readAll();
        }, ()=>resolve());
      };
      readAll();
    } else resolve();
  });
  const entries = [...dataTransfer.items].map(i=>i.webkitGetAsEntry&&i.webkitGetAsEntry()).filter(Boolean);
  for(const e of entries) await walk(e, '');
  return out;
}

async function openArchive(id){
  let t;
  try{ t = await api('/tasks/'+id); }catch(e){ toast(e.message); return; }
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  let items = [];   // [{file, rel}]
  // nombre sugerido: título + fecha de hoy → "Guion - 21 de julio"
  const hoy = new Date().toLocaleDateString('es',{day:'numeric',month:'long'});
  const defFolder = `${t.title} - ${hoy}`.slice(0,90);
  const nLinks = (t.files||[]).filter(f=>f.kind==='link').length;

  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML = `<div class="modal" style="max-width:560px">
    <div class="statuspill"><i style="background:${STATUS_META.terminado.hex}"></i>Terminar tarea</div>
    <h2>${esc(t.title)}</h2>
    <div class="sub">EL MATERIAL DEL PROYECTO SE ARCHIVA EN GOOGLE DRIVE</div>
    ${DRIVE.connected?`
      <label style="margin-top:14px">📁 Nombre de la carpeta en Drive</label>
      <input id="a-folder" value="${esc(defFolder)}" maxlength="90" placeholder="Ej: Guion 21 de julio">
      <div class="arch-dest" style="margin-top:8px">${ICONS.drive}<span>SERVIDOR-VIDEOS / ${esc(t.channel||'(sin canal)')} / <b id="a-dest-name">${esc(defFolder)}</b></span></div>
      ${nLinks?`<div style="font-size:12px;color:var(--muted);margin-top:8px">🔗 ${nLinks===1?'El link de la tarea se guardará':`Los ${nLinks} links de la tarea se guardarán`} también en la carpeta (<b>🔗 LINKS DEL PROYECTO.txt</b>).</div>`:''}
      <div class="dropzone" id="a-dz" style="margin-top:12px">
        <span class="big">📂</span>
        <b>Elige la carpeta del proyecto</b><br>
        <small style="color:var(--dim)">con la miniatura, guion, música, video… Arrástrala aquí o haz click.</small>
      </div>
      <input type="file" id="a-input" webkitdirectory hidden>
      <div class="arch-summary" id="a-summary"></div>
      <div class="arch-progress" id="a-prog" style="display:none">
        <div class="progress"><i id="a-bar"></i></div><span class="arch-pct" id="a-pct">0%</span>
      </div>
      <div class="arch-current" id="a-current"></div>
    `:`
      <div class="dupwarn" style="margin-top:14px"><b>⚠ Google Drive no está conectado</b>
      Sin Drive no se puede archivar el material. Conéctalo en Ajustes, o termina la tarea sin archivar
      (los adjuntos se quedan en el servidor).</div>
    `}
    <div class="err" id="a-err"></div>
    <div class="modal-actions">
      ${DRIVE.connected?`<button class="btn gold" id="a-go" disabled>✦ Subir y terminar</button>`:''}
      <button class="btn ghost" id="a-skip">Terminar sin archivar</button>
      <button class="btn ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });

  const paintSummary = ()=>{
    const total = items.reduce((n,x)=>n+x.file.size,0);
    const kindOf = f=>{
      const e=(f.name.split('.').pop()||'').toLowerCase();
      if(['jpg','jpeg','png','webp','gif','psd'].includes(e)) return 'miniatura';
      if(['mp3','wav','flac','m4a','aac','ogg'].includes(e)) return 'música';
      if(['mp4','mov','avi','mkv','webm'].includes(e)) return 'video';
      if(['txt','doc','docx','pdf','md','rtf'].includes(e)) return 'guion';
      return 'archivo';
    };
    $('#a-summary').innerHTML = items.length ? `
      <div class="arch-total"><span class="n">${items.length}</span> archivo${items.length===1?'':'s'} · ${fmtSize(total)}
        <button class="redo" id="a-redo">cambiar carpeta</button></div>
      <div class="arch-list">
        ${items.map(x=>`<div class="arch-file">
          <span class="fkind">${kindOf(x.file)}</span>
          <span class="fname">${esc(x.rel)}</span>
          <span class="fsize">${fmtSize(x.file.size)}</span>
        </div>`).join('')}
      </div>` : '';
    const go = $('#a-go'); if(go) go.disabled = !items.length || !folderName();
    const redo = $('#a-redo'); if(redo) redo.onclick = ()=>{ items=[]; paintSummary(); $('#a-dz').style.display=''; };
    if(items.length) $('#a-dz').style.display='none';
  };

  const folderName = ()=> ($('#a-folder')?.value || '').trim();
  const fin = $('#a-folder');
  if(fin){
    fin.oninput = ()=>{
      $('#a-dest-name').textContent = folderName() || '…';
      const go = $('#a-go'); if(go) go.disabled = !items.length || !folderName();
    };
  }

  const dz = $('#a-dz'), input = $('#a-input');
  if(dz && input){
    dz.onclick = ()=> input.click();
    input.onchange = ()=>{
      items = normalizeFolderFiles([...input.files].map(f=>({file:f, rel:f.webkitRelativePath||f.name})));
      input.value=''; paintSummary();
    };
    dz.ondragover = e=>{ e.preventDefault(); dz.classList.add('drag'); };
    dz.ondragleave = ()=> dz.classList.remove('drag');
    dz.ondrop = async e=>{
      e.preventDefault(); dz.classList.remove('drag');
      items = normalizeFolderFiles(await filesFromDrop(e.dataTransfer));
      paintSummary();
      if(!items.length) $('#a-err').textContent='No encontré archivos en lo que soltaste.';
    };
  }

  const finish = async (clean)=>{
    const r = await api(`/tasks/${t.id}/finish`,{method:'POST',body:JSON.stringify({clean_server_files:clean})});
    ov.remove(); await refresh(); renderApp();
    toast(clean&&r.cleaned_files?`✦ Tarea terminada — ${r.cleaned_files} adjunto${r.cleaned_files===1?'':'s'} limpiado${r.cleaned_files===1?'':'s'} del servidor`:'✦ Tarea terminada');
  };

  $('#a-skip').onclick = async ()=>{
    if(DRIVE.connected && !confirm('¿Terminar sin subir el material a Drive?')) return;
    try{ await finish(false); }catch(e){ $('#a-err').textContent=e.message; }
  };

  let nextIndex = 0;   // para que un reintento retome donde quedó, sin duplicar en Drive
  const go = $('#a-go');
  if(go) go.onclick = async ()=>{
    const totalBytes = items.reduce((n,x)=>n+x.file.size,0) || 1;
    let doneBytes = items.slice(0,nextIndex).reduce((n,x)=>n+x.file.size,0);
    go.disabled = true; $('#a-skip').disabled = true; $('#a-err').textContent='';
    if(fin) fin.disabled = true;   // el nombre queda fijo: un reintento sube a la MISMA carpeta
    $('#a-prog').style.display='flex';
    try{
      for(let i=nextIndex;i<items.length;i++){
        const {file, rel} = items[i];
        const subpath = rel.includes('/') ? rel.split('/').slice(0,-1).join('/') : '';
        $('#a-current').textContent = `(${i+1}/${items.length}) ${rel}`;
        const base = doneBytes;
        await uploadFileToDrive(t.id, file, subpath, folderName(), sent=>{
          const p = Math.min((base+sent)/totalBytes, 1);
          $('#a-bar').style.width = Math.round(p*100)+'%';
          $('#a-pct').textContent = Math.round(p*100)+'%';
        });
        doneBytes += file.size;
        nextIndex = i+1;
      }
      $('#a-current').textContent = 'Verificando y limpiando el servidor…';
      await finish(true);
    }catch(e){
      $('#a-err').textContent = e.message + ` — pulsa "Subir y terminar" para reintentar desde el archivo ${nextIndex+1}.`;
      go.disabled = false; $('#a-skip').disabled = false;
      go.textContent = '↻ Reintentar y terminar';
    }
  };
}

boot();
</script>
